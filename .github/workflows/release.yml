name: Build and Release Orchard

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Get version from tag
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="dev-$(date +%Y%m%d-%H%M%S)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Update version in Info.plist and project file
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" Orchard/Info.plist || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" Orchard/Info.plist || true
          sed -i '' "s/MARKETING_VERSION = [^;]*/MARKETING_VERSION = ${{ steps.version.outputs.version }}/g" Orchard.xcodeproj/project.pbxproj

      - name: Install Developer ID certificate
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          if [[ -z "$CERTIFICATE_P12" ]]; then
            echo "No certificate configured, skipping"
            exit 0
          fi

          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Build app
        run: |
          xcodebuild -project Orchard.xcodeproj \
                     -scheme Orchard \
                     -configuration Release \
                     -derivedDataPath build/ \
                     -archivePath build/Orchard.xcarchive \
                     OTHER_CODE_SIGN_FLAGS="--options=runtime" \
                     archive

      - name: Export app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -n "$APPLE_TEAM_ID" ]]; then
            cat > export_options.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>developer-id</string>
              <key>teamID</key>
              <string>$APPLE_TEAM_ID</string>
              <key>signingStyle</key>
              <string>automatic</string>
          </dict>
          </plist>
          EOF
          else
            cat > export_options.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>mac-application</string>
              <key>destination</key>
              <string>export</string>
          </dict>
          </plist>
          EOF
          fi

          xcodebuild -exportArchive \
                     -archivePath build/Orchard.xcarchive \
                     -exportPath build/export \
                     -exportOptionsPlist export_options.plist

      - name: Create DMG
        run: |
          mkdir -p dmg_contents
          cp -R build/export/Orchard.app dmg_contents/
          ln -s /Applications dmg_contents/Applications

          hdiutil create -volname "Orchard ${{ steps.version.outputs.version }}" \
                         -srcfolder dmg_contents \
                         -ov -format UDZO \
                         "Orchard-${{ steps.version.outputs.version }}.dmg"

      - name: Notarize and staple
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -n "$APPLE_ID" && -n "$APPLE_PASSWORD" && -n "$APPLE_TEAM_ID" ]]; then
            echo "Submitting for notarization..."
            SUBMIT_OUTPUT=$(xcrun notarytool submit "Orchard-${{ steps.version.outputs.version }}.dmg" \
                                    --apple-id "$APPLE_ID" \
                                    --password "$APPLE_PASSWORD" \
                                    --team-id "$APPLE_TEAM_ID" \
                                    --wait 2>&1) || true
            echo "$SUBMIT_OUTPUT"

            SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep "id:" | head -1 | awk '{print $2}')

            if echo "$SUBMIT_OUTPUT" | grep -q "status: Accepted"; then
              echo "Notarization accepted, stapling..."
              xcrun stapler staple "Orchard-${{ steps.version.outputs.version }}.dmg"
            else
              echo "Notarization failed. Fetching log..."
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" \
                notarization-log.json || true
              cat notarization-log.json
              echo "::error::Notarization was not accepted. Check log above."
              exit 1
            fi
          else
            echo "Skipping notarization - secrets not configured"
          fi

      - name: Calculate checksums
        run: |
          shasum -a 256 "Orchard-${{ steps.version.outputs.version }}.dmg" > "Orchard-${{ steps.version.outputs.version }}.dmg.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orchard-${{ steps.version.outputs.version }}
          path: |
            Orchard-${{ steps.version.outputs.version }}.dmg
            Orchard-${{ steps.version.outputs.version }}.dmg.sha256

      - name: Create Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Orchard-${{ steps.version.outputs.version }}.dmg
            Orchard-${{ steps.version.outputs.version }}.dmg.sha256
          body: |
            ## Orchard v${{ steps.version.outputs.version }}

            ### Installation
            1. Download the DMG file below
            2. Open the DMG and drag Orchard.app to your Applications folder
            3. Launch Orchard from Applications

            ### Changes
            See the commit history for detailed changes in this release.

            ### Checksums
            - **SHA256**: See the `.sha256` file for verification

            ### System Requirements
            - macOS 26 (Tahoe)
            - [Apple Container](https://github.com/apple/container) installed
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
